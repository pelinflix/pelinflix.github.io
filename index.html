<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelinflix - Anime izliyoruz!</title>
    <link rel="icon" type="image/png" href="https://fontmeme.com/permalink/260218/df7d552c.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>

    <header id="mainHeader">
        <div class="logo-container" onclick="switchSection('home', null)">
            <img src="https://fontmeme.com/permalink/260218/df7d552c.png" alt="PelinopTV Logo" class="logo-img">
        </div>
        <nav>
            <button class="nav-link" onclick="switchSection('categories', this)">Animeler</button>
            <button class="nav-link" onclick="switchSection('watchlist', this)">İzlenecekler</button>
        </nav>
    </header>

    <main>
        <!-- Home Page -->
        <section id="home" class="section active">
            <!-- Poster mosaic background -->
            <div class="home-bg-wrapper" aria-hidden="true">
                <div class="home-bg-posters">
                    <!-- Col 1: AoT → Berserk → Monster (x2) -->
                    <div class="poster-col" style="--dur:21s; --delay:0s">
                        <img src="https://image.tmdb.org/t/p/original/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/xctRBSZzvoHDHz38ZZUGxRYetvG.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/n5XNKXnoXpoXyfiCtXHOf8q8PFM.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/xctRBSZzvoHDHz38ZZUGxRYetvG.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/n5XNKXnoXpoXyfiCtXHOf8q8PFM.jpg" alt="">
                    </div>
                    <!-- Col 2: Chainsaw Man → Vinland Saga → Death Note → AoT 2 (x2) -->
                    <div class="poster-col" style="--dur:30s; --delay:-7s">
                        <img src="https://image.tmdb.org/t/p/original/xdzLBZjCVSEsic7m7nJc4jNJZVW.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/vUHlpA5c1NXkds59reY3HMb4Abs.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/nqPFi22qOOi8xnB1mrEasnG02vH.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/hqRb1wyIVsaMukZElPBUXoJPqrR.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/xdzLBZjCVSEsic7m7nJc4jNJZVW.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/vUHlpA5c1NXkds59reY3HMb4Abs.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/nqPFi22qOOi8xnB1mrEasnG02vH.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/hqRb1wyIVsaMukZElPBUXoJPqrR.jpg" alt="">
                    </div>
                    <!-- Col 3: Kakegurui → Hell's Paradise → Berserk (x2) -->
                    <div class="poster-col" style="--dur:18s; --delay:-4s">
                        <img src="https://image.tmdb.org/t/p/original/99jgepKwa0yqLY0pP5BlfYLH6nX.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/1V9I7SvZbYoMbSvdtnlkkq9SB1k.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/xctRBSZzvoHDHz38ZZUGxRYetvG.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/99jgepKwa0yqLY0pP5BlfYLH6nX.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/1V9I7SvZbYoMbSvdtnlkkq9SB1k.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/xctRBSZzvoHDHz38ZZUGxRYetvG.jpg" alt="">
                    </div>
                    <!-- Col 4: Death Parade → AoT → Death Note → Monster (x2) -->
                    <div class="poster-col" style="--dur:27s; --delay:-11s">
                        <img src="https://image.tmdb.org/t/p/original/q95PaZEpjfNzmz3c0TFFAG6lc7S.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/nqPFi22qOOi8xnB1mrEasnG02vH.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/n5XNKXnoXpoXyfiCtXHOf8q8PFM.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/q95PaZEpjfNzmz3c0TFFAG6lc7S.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/nqPFi22qOOi8xnB1mrEasnG02vH.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/n5XNKXnoXpoXyfiCtXHOf8q8PFM.jpg" alt="">
                    </div>
                    <!-- Col 5: AoT 2 → Vinland Saga → Kakegurui (x2) -->
                    <div class="poster-col" style="--dur:24s; --delay:-2s">
                        <img src="https://image.tmdb.org/t/p/original/hqRb1wyIVsaMukZElPBUXoJPqrR.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/vUHlpA5c1NXkds59reY3HMb4Abs.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/99jgepKwa0yqLY0pP5BlfYLH6nX.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/hqRb1wyIVsaMukZElPBUXoJPqrR.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/vUHlpA5c1NXkds59reY3HMb4Abs.jpg" alt="">
                        <img src="https://image.tmdb.org/t/p/original/99jgepKwa0yqLY0pP5BlfYLH6nX.jpg" alt="">
                    </div>
                </div>
                <div class="home-bg-vignette"></div>
            </div>
            <div class="landing-container">
                <h1 class="landing-title">Welcome to <img src="https://fontmeme.com/permalink/260218/df7d552c.png"
                        alt="Pelinflix" class="landing-logo"></h1>
                <p class="landing-subtitle">
                    <a href="https://www.twitch.tv/pelinop" target="_blank" class="neon-pelinop">Pelinop</a> anime
                    izliyor
                </p>
            </div>
            <p class="landing-footer-credit">Created by Okan12300 Contact: okanedu@proton.me</p>
        </section>

        <!-- Categories Section -->
        <section id="categories" class="section">
            <div class="anime-header" style="margin-bottom: 30px;">
                <h1>Animeler</h1>
            </div>
            <div class="categories-grid" id="categoriesGrid"></div>
        </section>


        <div id="dynamicSections"></div>

        <!-- İzlenecekler Section -->
        <section id="watchlist" class="section">
            <div class="watchlist-container">
                <div class="watchlist-header-row">
                    <h2 class="watchlist-title">İzlenecekler</h2>
                    <div class="expandable-search" id="watchlistSearchContainer">
                        <div class="search-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </div>
                        <div class="search-pill">
                            <span class="search-label">Anime ara</span>
                            <input type="text" id="watchlistSearchInput" placeholder="Attack on Titan..."
                                autocomplete="off">
                        </div>
                    </div>
                </div>
                <ul class="anime-ordered-list" id="watchlistItems">
                    <!-- List will be populated via JS -->
                </ul>
            </div>
        </section>
    </main>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="player-title-overlay">
                <span class="player-anime-name" id="playerAnimeName">ANİME ADI</span>
                <span class="player-episode-name" id="playerEpTitle">Bölüm Yükleniyor...</span>
            </div>
            <button class="close-modal" id="closeBtn">&times;</button>
            <div class="plyr-wrapper">
                <video id="player" controls playsinline>
                    <source src="" type="video/mp4">
                </video>
                <button id="skipIntroBtn" class="skip-intro-btn">Skip Intro</button>
            </div>
        </div>
    </div>

    <!-- Info Modal -->
    <div class="modal" id="infoModal">
        <div class="info-modal-box">
            <button class="close-modal" id="infoCloseBtn">&times;</button>
            <div class="info-title" id="infoModalTitle"
                style="font-size: 1.5rem; margin-bottom: 1rem; font-family: 'Poppins', sans-serif;"></div>
            <p class="info-description" id="infoModalDesc" style="font-size: 1.05rem;"></p>
            <div class="info-meta" id="infoModalMeta" style="margin-top: 1.5rem;"></div>
        </div>
    </div>

    <div id="toast">Bölüm henüz mevcut değil.</div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="js/script.js?v=2"></script>
</body>

</html>
